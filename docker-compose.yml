# ============================================================================
# Slowbooks Pro 2026 — Docker Compose
# Usage: docker compose up
# ============================================================================

services:
  postgres:
    image: postgres:17-alpine
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=100
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookkeeper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookkeeper}
      POSTGRES_DB: ${POSTGRES_DB:-bookkeeper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookkeeper}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5433}:5432"

  slowbooks:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bookkeeper}:${POSTGRES_PASSWORD:-bookkeeper}@postgres:5432/${POSTGRES_DB:-bookkeeper}
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-bookkeeper}
      PGPASSWORD: ${POSTGRES_PASSWORD:-bookkeeper}
      APP_HOST: "0.0.0.0"
      APP_PORT: "3001"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_WORKERS: "${APP_WORKERS:-2}"
      # ---- At-rest encryption (REQUIRED) ----
      # Encrypts employee bank routing/account numbers. Must be forwarded from
      # .env or the app boots with the public dev default and refuses to start
      # against Postgres (app/main.py startup guard). The :? form fails the
      # `docker compose up` loudly if it's empty — never default to an empty
      # string, which would silently encrypt PII under a blank key.
      PAYROLL_ENCRYPTION_SECRET: "${PAYROLL_ENCRYPTION_SECRET:?set PAYROLL_ENCRYPTION_SECRET in .env — generate one with openssl rand -base64 32}"
      # Optional previous key, only used during rotation (decrypt fallback).
      PAYROLL_ENCRYPTION_SECRET_PREV: ${PAYROLL_ENCRYPTION_SECRET_PREV:-}
      # Optional cookie-signing key. If empty the app auto-generates and
      # persists one to .slowbooks-session.key (see app/services/auth.py).
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-}
      # ---- Company + employer identity (optional, also editable in the UI) ----
      COMPANY_NAME: ${COMPANY_NAME:-My Company}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS:-}
      COMPANY_PHONE: ${COMPANY_PHONE:-}
      COMPANY_EMAIL: ${COMPANY_EMAIL:-}
      DEFAULT_TERMS: ${DEFAULT_TERMS:-Net 30}
      DEFAULT_TAX_RATE: ${DEFAULT_TAX_RATE:-0.0}
      EMPLOYER_EIN: ${EMPLOYER_EIN:-}
      EMPLOYER_STATE: ${EMPLOYER_STATE:-WA}
      SUTA_RATE: ${SUTA_RATE:-0.012}
      # Python 3.13 experimental JIT - uncomment for ~5-10% extra on hot loops
      # PYTHON_JIT: "1"
    ports:
      - "${APP_PORT:-3001}:3001"
    volumes:
      - slowbooks_uploads:/app/app/static/uploads
      - slowbooks_backups:/app/backups

volumes:
  postgres_data:
  slowbooks_uploads:
  slowbooks_backups:
