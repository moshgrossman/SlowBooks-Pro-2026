name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install "black>=24.8.0" "ruff>=0.6.0"
      # Whole-tree gate. The earlier allowlist existed because legacy
      # phases (1-3 routes, legacy services) carried pre-black-era style
      # and would have churned on a wholesale widening. The production-
      # readiness sweep formatted everything to black 24.8 / ruff 0.6,
      # so the gate now protects every file from regression — no risk
      # of a new file slipping through unformatted.
      - name: black --check
        run: black --check app/ tests/ scripts/
      - name: ruff check
        run: ruff check app/ tests/ scripts/

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: System deps for WeasyPrint
        run: |
          sudo apt-get update
          # libjpeg62-turbo was dropped from Ubuntu 24.04 (noble); Pillow
          # ships bundled JPEG support so we don't need a system libjpeg
          # for the runtime path. The remaining packages are what
          # WeasyPrint's cairo/pango stack pulls in.
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev \
            libxml2 libxslt1.1
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest with coverage
        env:
          # Quoted because the value contains colons (sqlite:///:memory:)
          # — unquoted, YAML mis-parses "sqlite:" as a nested mapping key
          # and the entire workflow fails validation at startup.
          DATABASE_URL: "sqlite:///:memory:"
          SESSION_SECRET_KEY: ci-secret-key
          RATE_LIMIT_ENABLED: "0"
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      # PR gate. The weekly cron in pip-audit.yml is for catching CVEs
      # disclosed AFTER a release shipped; this step prevents introducing
      # a known-vulnerable dep via PR. Strict mode (no --ignore-vuln) —
      # if a CVE pops up that has no fix yet, add an ignore here with a
      # comment explaining why + tracking ticket.
      - name: Audit requirements.txt
        run: pip-audit --requirement requirements.txt --strict

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t slowbooks-pro-ci:${{ github.sha }} .
      - name: Verify image starts
        run: |
          docker run --rm --entrypoint python slowbooks-pro-ci:${{ github.sha }} \
            -c "import app.main; print('import OK')"
