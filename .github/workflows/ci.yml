name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install "black>=24.8.0" "ruff>=0.6.0"
      - name: black --check (phase 4/5/6 code)
        run: |
          black --check \
            app/services/settings_service.py \
            app/services/ai_service.py \
            app/services/ai_tools.py \
            app/services/analytics.py \
            app/services/auth.py \
            app/routes/analytics.py \
            app/routes/auth.py \
            app/main.py \
            tests/
      - name: ruff check
        run: |
          ruff check \
            app/services/settings_service.py \
            app/services/ai_service.py \
            app/services/ai_tools.py \
            app/services/analytics.py \
            app/services/auth.py \
            app/routes/analytics.py \
            app/routes/auth.py \
            app/main.py \
            tests/

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: System deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev libjpeg62-turbo \
            libpng16-16 libxml2 libxslt1.1
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest with coverage
        env:
          DATABASE_URL: sqlite:///:memory:
          SESSION_SECRET_KEY: ci-secret-key
          RATE_LIMIT_ENABLED: "0"
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t slowbooks-pro-ci:${{ github.sha }} .
      - name: Verify image starts
        run: |
          docker run --rm --entrypoint python slowbooks-pro-ci:${{ github.sha }} \
            -c "import app.main; print('import OK')"
